name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script configured yet."
          fi

      - name: Unit tests if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No unit test script configured yet."
          fi

      - name: Build and validate static app
        run: npm run build

      - name: Basic security checks
        run: npm run security:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local preview
        shell: bash
        run: |
          python3 -m http.server 8781 > temperaturna-lista-http.log 2>&1 &
          echo $! > temperaturna-lista-http.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8781/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat temperaturna-lista-http.log
          exit 1

      - name: Playwright smoke tests
        env:
          BASE_URL: http://127.0.0.1:8781/
        run: npm run test:smoke

      - name: Security, accessibility, privacy and performance tests
        env:
          BASE_URL: http://127.0.0.1:8781/
        run: npm run test:quality

      - name: Synthetic clinical fixture tests
        env:
          BASE_URL: http://127.0.0.1:8781/
        run: npm run test:clinical

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            temperaturna-lista-http.log
          if-no-files-found: ignore
